name: Terraform Deploy

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Prevent concurrent runs against the same environment
concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false   # never cancel an in-flight apply

permissions:
  id-token: write       # required for OIDC (passwordless Azure auth)
  contents: read
  pull-requests: write  # allows posting plan diff as PR comment

env:
  TF_VERSION: "1.9.0"
  ARM_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
  # No ARM_CLIENT_SECRET — we use OIDC federated credentials instead

jobs:
  # ────────────────────────────────────────────
  # JOB 1: Lint, format check, and static validate
  # Runs on every push and every PR
  # ────────────────────────────────────────────
  lint-and-validate:
    name: Lint & Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # Authenticate to Azure via OIDC (no long-lived secrets)
      - name: Azure OIDC login
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: terraform init -input=false

      # Fail if any file is not formatted
      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      # Validate configuration syntax and provider references
      - name: Terraform Validate
        run: terraform validate

      # Optional: tflint catches deprecations and bad patterns
      - name: TFLint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest
      - run: tflint --init && tflint

  # ────────────────────────────────────────────
  # JOB 2: Generate a plan and upload as artifact
  # Depends on lint passing
  # ────────────────────────────────────────────
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: lint-and-validate

    # Save the plan exit code so apply can detect no-op plans
    outputs:
      exitcode: ${{ steps.plan.outputs.exitcode }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          # Wrap exit code so we can capture it below
          terraform_wrapper: true

      - name: Azure OIDC login
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: terraform init -input=false

      # -detailed-exitcode: 0 = no changes, 1 = error, 2 = changes present
      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -detailed-exitcode \
            -out=tfplan \
            -input=false \
            -no-color 2>&1 | tee plan.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true   # let us post the comment even if plan fails

      # Store the binary plan so apply can use the exact same plan
      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: |
            tfplan
            plan.txt
          retention-days: 5

      # Post plan output as a comment on pull requests
      - name: Post plan to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs   = require('fs');
            const plan = fs.readFileSync('plan.txt', 'utf8');
            const trimmed = plan.length > 60000
              ? plan.substring(0, 60000) + '\n\n... [truncated]'
              : plan;

            const body = `### Terraform Plan — \`${{ github.sha }}\`
            \`\`\`hcl
            ${trimmed}
            \`\`\``;

            // Delete previous plan comments to keep PR clean
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.issue.number,
            });
            for (const c of comments) {
              if (c.body.startsWith('### Terraform Plan')) {
                await github.rest.issues.deleteComment({
                  owner:      context.repo.owner,
                  repo:       context.repo.repo,
                  comment_id: c.id,
                });
              }
            }

            github.rest.issues.createComment({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: context.issue.number,
              body,
            });

      # Fail the job if plan itself errored (exit code 1)
      - name: Fail on plan error
        if: steps.plan.outputs.exitcode == '1'
        run: exit 1

  # ────────────────────────────────────────────
  # JOB 3: Apply — only on pushes to main
  # Requires manual approval via GitHub Environment
  # ────────────────────────────────────────────
  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs: plan

    # Only apply when merging to main, never on PRs
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    # "production" environment must be created in:
    # Settings → Environments → production
    # Add required reviewers there to enforce the approval gate
    environment:
      name: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Azure OIDC login
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan

      # Apply only the pre-approved plan binary — no surprises
      - name: Terraform Apply
        run: terraform apply -input=false -auto-approve tfplan

      - name: Summary
        if: always()
        run: |
          echo "## Terraform Apply — $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Actor**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY